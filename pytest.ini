[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Pure logic tests — no DB, no HTTP
    integration: Tests that hit a real in-memory SQLite database
    contract: Tests that hit the FastAPI app via AsyncClient
    consistency: Cross-layer enum/naming-convention checks
